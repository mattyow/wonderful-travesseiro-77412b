  <style>
    /* ---------- Custom fonts ---------- */
    @font-face {

:root {

      --text: #0036CA;

      --font-mono: "Umiak Mono", ui-monospace, "SF Mono", Menlo, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;

header {

      margin: 0 auto;
      padding: 4rem 2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }
    .logo {
      width: auto;
      height: 5.5rem;
      color: var(--text);
      flex-shrink: 0;
    }
    .reset-home,
    .reset-logo {
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      color: inherit;
      font: inherit;
      text-align: left;
    }
    .reset-home h1 {
      transition: opacity 0.15s ease;
    }
    .reset-home:hover h1,
    .reset-logo:hover .logo {
      opacity: 0.7;
    }
    .header-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .header-link {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s ease;
    }
    .header-link:hover {
      border-bottom-color: var(--text);
    }
h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      font-style: normal;
      margin: 0 0 0.25rem;
      letter-spacing: -0.01em;
    }
    .tagline {
      color: var(--muted);
      margin: 0;
      font-size: 1.15rem;
    }

main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 2rem 1.5rem;
    }
.filters {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .filters-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem 2rem;
    }
    .filters-toggle {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .filters-toggle:hover {
      color: var(--text);
    }
    .filters-toggle svg {
      width: 0.7rem;
      height: 0.7rem;
      transition: transform 0.2s ease;
    }
    .filters-toggle[aria-expanded="true"] svg {
      transform: rotate(180deg);
    }
    .filters {
      max-width: none;
      margin: 0;
      padding: 0;
      display: none;
    }
    .filters.open {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .filter-pill {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .filter-pill:hover {
      border-color: rgba(0, 54, 202, 0.5);
    }
    .filter-pill.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);

.search-wrap {

      top: 0;
      z-index: 40;

      margin: 0;
      padding: 1.5rem 2rem;
      background: var(--bg);

    .search-wrap-inner {
      max-width: 1200px;

    .search-label {

.search-input::placeholder {

    .empty-state {

    .to-top {

      margin: 0;

    /* ---------- Modal ---------- */

  <script>

    // ----------------------------------------------------------------
    // Rendering
    // ----------------------------------------------------------------
    const grid = document.getElementById("grid");
    const backdrop = document.getElementById("modal-backdrop");
    const modalCover = document.getElementById("modal-cover");
    const modalTitle = document.getElementById("modal-title");
    const modalAuthor = document.getElementById("modal-author");
    const modalAdditionalAuthorsWrap = document.getElementById("modal-additional-authors-wrap");
    const modalAdditionalAuthors = document.getElementById("modal-additional-authors");
    const modalGenresWrap = document.getElementById("modal-genres-wrap");
    const modalGenres = document.getElementById("modal-genres");
    const modalThemesWrap = document.getElementById("modal-themes-wrap");
    const modalThemes = document.getElementById("modal-themes");
    const modalMotifsWrap = document.getElementById("modal-motifs-wrap");
    const modalMotifs = document.getElementById("modal-motifs");
    const modalIsbnWrap = document.getElementById("modal-isbn-wrap");
    const modalIsbn = document.getElementById("modal-isbn");

  // ----------------------------------------------------------------
    // Cover image lookup: Google Books primary, Open Library fallback.
    // Lazy-loaded via IntersectionObserver — covers fetch only when
    // their card scrolls into view. Results cached in memory.
    // ----------------------------------------------------------------
    const coverCache = new Map();        // isbn -> resolved URL (or null)
    const inflightLookups = new Map();   // isbn -> Promise<url|null>

    function openLibraryUrl(isbn) {
      return `https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg`;
    }

    async function googleBooksCover(isbn) {
      try {
        const res = await fetch(
          `https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}&fields=items(volumeInfo/imageLinks)`
        );
        if (!res.ok) return null;
        const data = await res.json();
        const links = data?.items?.[0]?.volumeInfo?.imageLinks;
        if (!links) return null;
        // Prefer largest available
        let url =
          links.extraLarge ||
          links.large ||
          links.medium ||
          links.small ||
          links.thumbnail ||
          links.smallThumbnail;
        if (!url) return null;
        // Google returns http:// — upgrade to https
        url = url.replace(/^http:\/\//, "https://");
        // Strip page-curl edge and request a larger zoom when possible
        url = url.replace(/&edge=curl/, "");
        return url;
      } catch (err) {
        return null;
      }
    }

    function checkImageLoads(url) {
      // Test that an image URL actually resolves to a usable image.
      // Open Library returns a 1x1 placeholder if no cover exists.
      return new Promise((resolve) => {
        const probe = new Image();
        probe.onload = () => {
          // 1x1 image = Open Library's "no cover" placeholder
          if (probe.naturalWidth <= 1 && probe.naturalHeight <= 1) {
            resolve(false);
          } else {
            resolve(true);
          }
        };
        probe.onerror = () => resolve(false);
        probe.src = url;
      });
    }

    async function findCover(isbn) {
      if (!isbn) return null;
      if (coverCache.has(isbn)) return coverCache.get(isbn);
      if (inflightLookups.has(isbn)) return inflightLookups.get(isbn);

      const lookup = (async () => {
        // Try Google Books first
        const gUrl = await googleBooksCover(isbn);
        if (gUrl) {
          coverCache.set(isbn, gUrl);
          return gUrl;
        }
        // Fall back to Open Library
        const oUrl = openLibraryUrl(isbn);
        const valid = await checkImageLoads(oUrl);
        const result = valid ? oUrl : null;
        coverCache.set(isbn, result);
        return result;
      })();

      inflightLookups.set(isbn, lookup);
      const result = await lookup;
      inflightLookups.delete(isbn);
      return result;
    }

    // IntersectionObserver triggers cover lookup when card enters viewport
    const coverObserver = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          const wrap = entry.target;
          const isbn = wrap.dataset.isbn;
          coverObserver.unobserve(wrap);

          findCover(isbn).then((url) => {
            if (!url) return;
            const img = document.createElement("img");
            img.src = url;
            img.alt = wrap.dataset.title || "";
            img.loading = "lazy";
            img.decoding = "async";
            img.style.position = "absolute";
            img.style.inset = "0";
            img.onerror = () => { img.remove(); };
            wrap.appendChild(img);
          });
        });
      },
      { rootMargin: "200px" }   // Start fetching 200px before entering view
    );

    function renderCard(book) {
      const card = document.createElement("button");
      card.className = "card";
      card.type = "button";

      const wrap = document.createElement("div");
      wrap.className = "cover-wrap";
      wrap.dataset.isbn = book.isbn || "";
      wrap.dataset.title = book.title;

      const placeholder = document.createElement("div");
      placeholder.className = "placeholder";
      placeholder.innerHTML = `
        <span class="ph-title">${book.title}</span>
        <span class="ph-author">${book.author}</span>
      `;
      wrap.appendChild(placeholder);

      // Only start observing if there's an ISBN to look up
      if (book.isbn) coverObserver.observe(wrap);

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `
        <p class="book-title">${book.title}</p>
        <p class="book-author">${book.author}</p>
      `;

      card.appendChild(wrap);
      card.appendChild(meta);
      card.addEventListener("click", () => openModal(book));
      return card;
    }

function renderPills(container, items, type) {
      container.innerHTML = "";
      items.forEach((label) => {
        const pill = document.createElement("button");
        pill.className = "pill";
        pill.type = "button";
        pill.textContent = label;
        pill.title = `Filter by ${label}`;
        pill.addEventListener("click", (e) => {
          e.stopPropagation();
          filterFromModal(type, label);
        });
        container.appendChild(pill);
      });
    }

function filterFromModal(type, value) {
      closeModal();
      searchInput.value = "";
      if (type === "genre") {
        activeGenre = value;
        activeTheme = null;
      } else if (type === "theme") {
        activeGenre = null;
        activeTheme = value;
      }
      renderFilters();
      render("");
      filtersContainer.classList.add("open");
      filtersToggle.setAttribute("aria-expanded", "true");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

async function openModal(book) {
      const url = await findCover(book.isbn);
      if (url) {
        modalCover.src = url;
        modalCover.alt = book.title;
        modalCover.style.display = "";
      } else {
        modalCover.style.display = "none";
      }

      modalTitle.textContent = book.title;
      modalAuthor.textContent = book.author;

      if (book.additionalAuthors) {
        modalAdditionalAuthors.textContent = book.additionalAuthors;
        modalAdditionalAuthorsWrap.hidden = false;
      } else {
        modalAdditionalAuthorsWrap.hidden = true;
      }

      if (book.genres && book.genres.length) {
        renderPills(modalGenres, book.genres, "genre");
        modalGenresWrap.hidden = false;
      } else {
        modalGenresWrap.hidden = true;
      }

      if (book.themes && book.themes.length) {
        renderPills(modalThemes, book.themes, "theme");
        modalThemesWrap.hidden = false;
      } else {
        modalThemesWrap.hidden = true;
      }

      if (book.motifs && book.motifs.length) {
        renderPills(modalMotifs, book.motifs);
        modalMotifsWrap.hidden = false;
      } else {
        modalMotifsWrap.hidden = true;
      }

      if (book.isbn) {
        modalIsbn.textContent = book.isbn;
        modalIsbnWrap.hidden = false;
      } else {
        modalIsbnWrap.hidden = true;
      }

      backdrop.classList.add("open");
      backdrop.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      backdrop.classList.remove("open");
      backdrop.setAttribute("aria-hidden", "true");
    }

    backdrop.addEventListener("click", (e) => {
      if (e.target === backdrop) closeModal();
    });
    document.querySelector(".modal-close").addEventListener("click", closeModal);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

// Fisher-Yates shuffle for a fair random order
    const SORTED_BOOKS = (() => {
      const arr = BOOKS.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    })();
    const searchInput = document.getElementById("search");
    const resultsCount = document.getElementById("results-count");
    const filtersContainer = document.getElementById("filters");

    let activeGenre = null;
    let activeTheme = null;

    function normalize(str) {
      return (str || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

function bookMatches(book, query, genre, exactTheme) {
      if (genre && !(book.genres || []).includes(genre)) return false;
      if (exactTheme && !(book.themes || []).includes(exactTheme)) return false;
      if (!query) return true;
      const haystack = normalize(
        [book.title, book.author, book.additionalAuthors].filter(Boolean).join(" ")
      );
      return query.split(/\s+/).every((term) => haystack.includes(term));
    }

    function getGenreCounts() {
      const counts = new Map();
      SORTED_BOOKS.forEach((book) => {
        (book.genres || []).forEach((g) => {
          counts.set(g, (counts.get(g) || 0) + 1);
        });
      });
      return counts;
    }

    function renderFilters() {
      filtersContainer.innerHTML = "";
      const counts = getGenreCounts();
      // Sort genres by frequency (most common first), then alphabetically
      const sortedGenres = Array.from(counts.entries()).sort((a, b) => {
        if (b[1] !== a[1]) return b[1] - a[1];
        return a[0].localeCompare(b[0]);
      });

      // "All" pill first
      const allBtn = document.createElement("button");
      allBtn.className = "filter-pill" + (activeGenre === null ? " active" : "");
      allBtn.textContent = `All (${SORTED_BOOKS.length})`;
      allBtn.addEventListener("click", () => {
        activeGenre = null;
        renderFilters();
        render(searchInput.value);
      });
      filtersContainer.appendChild(allBtn);

      sortedGenres.forEach(([genre, count]) => {
        const btn = document.createElement("button");
        btn.className = "filter-pill" + (activeGenre === genre ? " active" : "");
        btn.textContent = `${genre} (${count})`;
        btn.addEventListener("click", () => {
          activeGenre = activeGenre === genre ? null : genre;
          renderFilters();
          render(searchInput.value);
        });
        filtersContainer.appendChild(btn);
      });
    }

function render(query = "") {
      const normalizedQuery = normalize(query.trim());
      const filtered = SORTED_BOOKS.filter((book) =>
        bookMatches(book, normalizedQuery, activeGenre, activeTheme)
      );

      grid.innerHTML = "";

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No books found.";
        grid.appendChild(empty);
      } else {
        filtered.forEach((book) => grid.appendChild(renderCard(book)));
      }

      const total = SORTED_BOOKS.length;
const parts = [];
      if (activeGenre) parts.push(activeGenre);
      if (activeTheme) parts.push(`theme: ${activeTheme}`);
      if (normalizedQuery) parts.push(`"${query.trim()}"`);
      const filterText = parts.length ? ` matching ${parts.join(" + ")}` : "";
      resultsCount.textContent = (normalizedQuery || activeGenre)
        ? `${filtered.length} of ${total} books${filterText}`
        : `${total} books`;
    }

    searchInput.addEventListener("input", (e) => render(e.target.value));

    function resetHome() {
      activeGenre = null;
      activeTheme = null;
      searchInput.value = "";
      renderFilters();
      render("");
      // Collapse the filter panel
      filtersContainer.classList.remove("open");
      filtersToggle.setAttribute("aria-expanded", "false");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.getElementById("reset-home").addEventListener("click", resetHome);
    document.getElementById("reset-logo").addEventListener("click", resetHome);

const filtersToggle = document.getElementById("filters-toggle");
    const filtersToggleLabel = document.getElementById("filters-toggle-label");

function updateToggleLabel() {
      if (activeGenre) {
        filtersToggleLabel.textContent = `Filter: ${activeGenre}`;
      } else if (activeTheme) {
        filtersToggleLabel.textContent = `Theme: ${activeTheme}`;
      } else {
        filtersToggleLabel.textContent = "Filter by genre";
      }
    }

    filtersToggle.addEventListener("click", () => {
      const isOpen = filtersContainer.classList.toggle("open");
      filtersToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    });

    // Wrap render() so we also update the toggle label whenever filtering changes
    const originalRender = render;
    render = function (query = "") {
      updateToggleLabel();
      return originalRender(query);
    };

    renderFilters();
    render();
    const toTopBtn = document.getElementById("to-top");

    window.addEventListener("scroll", () => {
      if (window.scrollY > 600) {
        toTopBtn.classList.add("visible");
      } else {
        toTopBtn.classList.remove("visible");
      }
    });

    toTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
    // Mobile sidebar toggle
    const sidebarToggle = document.getElementById("sidebar-toggle");
    const sidebar = document.getElementById("sidebar");

    sidebarToggle.addEventListener("click", () => {
      const isOpen = sidebar.classList.toggle("open");
      sidebarToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    });

    // Close sidebar when a filter or search is interacted with on mobile
    sidebar.addEventListener("click", (e) => {
      if (window.innerWidth > 768) return;
      // Close when clicking a filter pill or filter toggle
      if (e.target.closest(".filter-pill") || e.target.closest(".filters-toggle")) {
        // Small delay so the click registers first
        setTimeout(() => sidebar.classList.remove("open"), 100);
      }
    });
  </script>
</body>
</html>
