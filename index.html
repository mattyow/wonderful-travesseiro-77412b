<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books — Matt Yow's personal library</title>
  <style>
    /* ---------- Custom fonts ---------- */
    @font-face {
      font-family: "Auroc Text";
      src: url("fonts/AurocText-Italic.woff") format("woff");
      font-style: italic;
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: "Phantom Sans";
      src: url("fonts/PhantomSans-Book.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Umiak Mono";
      src: url("fonts/Umiak-MonoNormal.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #fafaf7;
      --text: #1a1a1a;
      --muted: #777;
      --card: #e8e6e0;
      --border: #ececec;

      --font-display: "Auroc Text", Georgia, serif;
      --font-sans: "Phantom Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "Umiak Mono", ui-monospace, "SF Mono", Menlo, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem;
    }
    h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 400;
      font-style: italic;
      margin: 0 0 0.25rem;
      letter-spacing: -0.01em;
    }
    .tagline {
      color: var(--muted);
      margin: 0;
      font-size: 1rem;
    }

main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 2rem 1.5rem;
    }

    .search-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 1.5rem;
    }
    .search-input {
      width: 100%;
      max-width: 420px;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      font-family: var(--font-sans);
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease;
    }
    .search-input:focus {
      border-color: #999;
    }
    .search-input::placeholder {
      color: var(--muted);
    }
    .results-count {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 4rem 2rem;
      font-style: italic;
    }

    .card {
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-align: left;
      font: inherit;
      color: inherit;
      width: 100%;
    }

    .cover-wrap {
      position: relative;
      aspect-ratio: 2 / 3;
      background: var(--card);
      border-radius: 3px;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover .cover-wrap,
    .card:focus-visible .cover-wrap {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }
    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      gap: 0.5rem;
      text-align: center;
    }
    .placeholder .ph-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 0.95rem;
      color: #555;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .placeholder .ph-author {
      font-size: 0.7rem;
      color: #888;
    }

    .meta {
      margin-top: 0.65rem;
    }
    .book-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 0.95rem;
      font-weight: 400;
      margin: 0;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .book-author {
      font-size: 0.72rem;
      color: var(--muted);
      margin: 0.2rem 0 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---------- Modal ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(20, 20, 20, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: var(--bg);
      max-width: 560px;
      width: 100%;
      padding: 2.5rem;
      border-radius: 6px;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-close {
      position: absolute;
      top: 0.75rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.75rem;
      line-height: 1;
      cursor: pointer;
      color: var(--muted);
      padding: 0.25rem 0.5rem;
    }
    .modal-close:hover { color: var(--text); }
    .modal-cover {
      width: 160px;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      background: var(--card);
      display: block;
    }
    .modal h2 {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 400;
      font-size: 1.65rem;
      margin: 0 0 0.25rem;
      line-height: 1.25;
    }
    .modal .modal-author {
      color: var(--muted);
      margin: 0 0 1.25rem;
      font-size: 0.95rem;
    }
    .modal-field {
      margin-top: 1rem;
    }
    .modal-field-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .pill {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      background: var(--card);
      border-radius: 999px;
      color: var(--text);
    }
    .modal-field-value {
      font-size: 0.85rem;
      color: var(--text);
    }
    /* ISBN specifically: mono */
    #modal-isbn {
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }
  </style>
</head>

    genres: ["Literary fiction", "Speculative fiction"],
    themes: ["Climate and creature", "Place and danger", "Ecological strangeness"]
  },
  {
    title: "Only the Lowly",
    author: "Brian Catling",
    isbn: "9781916041103",
    genres: ["Literary fiction", "Weird fiction"],
    themes: ["The marginal and the mythic", "Strange figures", "Catling's signature dreamscapes"]
  },
  {
    title: "Homage to the Alphabet: Typeface Sourcebook",
    author: "Rockport Publishers",
    isbn: "9780935603477",
    genres: ["Design", "Typography", "Reference"],
    themes: ["Typeface specimens", "Letterform variety", "Design resources"]
  }
];

    // ----------------------------------------------------------------
    // Rendering
    // ----------------------------------------------------------------
    const grid = document.getElementById("grid");
    const backdrop = document.getElementById("modal-backdrop");
    const modalCover = document.getElementById("modal-cover");
    const modalTitle = document.getElementById("modal-title");
    const modalAuthor = document.getElementById("modal-author");
    const modalAdditionalAuthorsWrap = document.getElementById("modal-additional-authors-wrap");
    const modalAdditionalAuthors = document.getElementById("modal-additional-authors");
    const modalGenresWrap = document.getElementById("modal-genres-wrap");
    const modalGenres = document.getElementById("modal-genres");
    const modalThemesWrap = document.getElementById("modal-themes-wrap");
    const modalThemes = document.getElementById("modal-themes");
    const modalMotifsWrap = document.getElementById("modal-motifs-wrap");
    const modalMotifs = document.getElementById("modal-motifs");
    const modalIsbnWrap = document.getElementById("modal-isbn-wrap");
    const modalIsbn = document.getElementById("modal-isbn");

    function coverUrl(isbn) {
      if (!isbn) return null;
      return `https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg`;
    }

    function renderCard(book) {
      const card = document.createElement("button");
      card.className = "card";
      card.type = "button";

      const wrap = document.createElement("div");
      wrap.className = "cover-wrap";

      const url = coverUrl(book.isbn);
      const placeholder = document.createElement("div");
      placeholder.className = "placeholder";
      placeholder.innerHTML = `
        <span class="ph-title">${book.title}</span>
        <span class="ph-author">${book.author}</span>
      `;

      if (url) {
        // Placeholder sits behind the image as fallback
        wrap.appendChild(placeholder);
        const img = document.createElement("img");
        img.src = url;
        img.alt = book.title;
        img.loading = "lazy";
        img.decoding = "async";
        img.style.position = "absolute";
        img.style.inset = "0";
        img.onerror = () => { img.remove(); };
        wrap.appendChild(img);
      } else {
        wrap.appendChild(placeholder);
      }

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `
        <p class="book-title">${book.title}</p>
        <p class="book-author">${book.author}</p>
      `;

      card.appendChild(wrap);
      card.appendChild(meta);
      card.addEventListener("click", () => openModal(book));
      return card;
    }

    function renderPills(container, items) {
      container.innerHTML = "";
      items.forEach((label) => {
        const pill = document.createElement("span");
        pill.className = "pill";
        pill.textContent = label;
        container.appendChild(pill);
      });
    }

    function openModal(book) {
      const url = coverUrl(book.isbn);
      if (url) {
        modalCover.src = url;
        modalCover.alt = book.title;
        modalCover.style.display = "";
      } else {
        modalCover.style.display = "none";
      }

      modalTitle.textContent = book.title;
      modalAuthor.textContent = book.author;

      if (book.additionalAuthors) {
        modalAdditionalAuthors.textContent = book.additionalAuthors;
        modalAdditionalAuthorsWrap.hidden = false;
      } else {
        modalAdditionalAuthorsWrap.hidden = true;
      }

      if (book.genres && book.genres.length) {
        renderPills(modalGenres, book.genres);
        modalGenresWrap.hidden = false;
      } else {
        modalGenresWrap.hidden = true;
      }

      if (book.themes && book.themes.length) {
        renderPills(modalThemes, book.themes);
        modalThemesWrap.hidden = false;
      } else {
        modalThemesWrap.hidden = true;
      }

      if (book.motifs && book.motifs.length) {
        renderPills(modalMotifs, book.motifs);
        modalMotifsWrap.hidden = false;
      } else {
        modalMotifsWrap.hidden = true;
      }

      if (book.isbn) {
        modalIsbn.textContent = book.isbn;
        modalIsbnWrap.hidden = false;
      } else {
        modalIsbnWrap.hidden = true;
      }

      backdrop.classList.add("open");
      backdrop.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      backdrop.classList.remove("open");
      backdrop.setAttribute("aria-hidden", "true");
    }

    backdrop.addEventListener("click", (e) => {
      if (e.target === backdrop) closeModal();
    });
    document.querySelector(".modal-close").addEventListener("click", closeModal);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

// Pre-sort books once
    const SORTED_BOOKS = BOOKS.slice().sort((a, b) => a.title.localeCompare(b.title));

    const searchInput = document.getElementById("search");
    const resultsCount = document.getElementById("results-count");

    function normalize(str) {
      return (str || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function bookMatches(book, query) {
      if (!query) return true;
      const haystack = normalize(
        [book.title, book.author, book.additionalAuthors].filter(Boolean).join(" ")
      );
      // Match all whitespace-separated terms
      return query.split(/\s+/).every((term) => haystack.includes(term));
    }

    function render(query = "") {
      const normalizedQuery = normalize(query.trim());
      const filtered = SORTED_BOOKS.filter((book) => bookMatches(book, normalizedQuery));

      grid.innerHTML = "";

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No books found.";
        grid.appendChild(empty);
      } else {
        filtered.forEach((book) => grid.appendChild(renderCard(book)));
      }

      const total = SORTED_BOOKS.length;
      resultsCount.textContent = normalizedQuery
        ? `${filtered.length} of ${total} books`
        : `${total} books`;
    }

    searchInput.addEventListener("input", (e) => render(e.target.value));

    render();
  </script>
</body>
</html>
