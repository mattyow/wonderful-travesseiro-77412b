<html lang="en">
<head>

  <meta name="description" content="Cataloging my home library." />

  <meta property="og:description" content="Cataloging my home library." />

  <meta property="og:url" content="https://matt-yows-books.netlify.app/" />
  <meta property="og:site_name" content="Matt Yow's books" />

  <!-- Twitter Cards -->
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    /* ---------- Custom fonts ---------- */
    @font-face {
      font-family: "Auroc Text";
      src: url("fonts/AurocText-Italic.woff") format("woff");
      font-style: italic;
      font-weight: 400;
      font-display: swap;
    }
    @font-face {
      font-family: "Auroc Text";
      src: url("fonts/AurocText-Bold.woff") format("woff");
      font-style: normal;
      font-weight: 700;
      font-display: swap;
    }
    @font-face {
      font-family: "Phantom Sans";
      src: url("fonts/PhantomSans-Book.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Umiak Mono";
      src: url("fonts/Umiak-MonoNormal.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

:root {
      --bg: #D0FFF3;
      --text: #0036CA;
      --muted: #0036CA;
      --card: rgba(0, 54, 202, 0.10);
      --border: #0036CA;

      --font-display: "Auroc Text", Georgia, serif;
      --font-sans: "Phantom Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "Umiak Mono", ui-monospace, "SF Mono", Menlo, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }
    .logo {
      width: auto;
      height: 5.5rem;
      color: var(--text);
      flex-shrink: 0;
    }
    .reset-home,
    .reset-logo {
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      color: inherit;
      font: inherit;
      text-align: left;
    }
    .reset-home h1 {
      transition: opacity 0.15s ease;
    }
    .reset-home:hover h1,
    .reset-logo:hover .logo {
      opacity: 0.7;
    }
h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      font-style: normal;
      margin: 0 0 0.25rem;
      letter-spacing: -0.01em;
    }
    .tagline {
      color: var(--muted);
      margin: 0;
      font-size: 1.15rem;
    }

main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 2rem 1.5rem;
    }
.filters {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .filters-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 1.5rem;
    }
    .filters-toggle {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .filters-toggle:hover {
      color: var(--text);
    }
    .filters-toggle svg {
      width: 0.7rem;
      height: 0.7rem;
      transition: transform 0.2s ease;
    }
    .filters-toggle[aria-expanded="true"] svg {
      transform: rotate(180deg);
    }
    .filters {
      max-width: none;
      margin: 0;
      padding: 0;
      display: none;
    }
    .filters.open {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .filter-pill {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .filter-pill:hover {
      border-color: rgba(0, 54, 202, 0.5);
    }
    .filter-pill.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .search-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 1.5rem;
    }
    .search-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .search-input {
      width: 100%;
      max-width: 420px;
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: transparent;
      font-family: var(--font-sans);
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease;
    }
    .search-input:focus {
      border-color: rgba(0, 54, 202, 0.5);
    }
.search-input::placeholder {
      color: rgba(0, 54, 202, 0.5);
    }
    .results-count {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 4rem 2rem;
      font-style: italic;
    }
    .to-top {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      width: 2.75rem;
      height: 2.75rem;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.2s ease, transform 0.2s ease, background 0.15s ease;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      z-index: 50;
    }
    .to-top.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .to-top:hover {
      background: var(--card);
    }
    .to-top svg {
      width: 1.1rem;
      height: 1.1rem;
    }

    .card {
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-align: left;
      font: inherit;
      color: inherit;
      width: 100%;
    }

    .cover-wrap {
      position: relative;
      aspect-ratio: 2 / 3;
      background: var(--card);
      border-radius: 3px;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover .cover-wrap,
    .card:focus-visible .cover-wrap {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }
    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      gap: 0.5rem;
      text-align: center;
    }
    .placeholder .ph-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .placeholder .ph-author {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .meta {
      margin-top: 0.65rem;
    }
    .book-title {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 0.95rem;
      font-weight: 400;
      margin: 0;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .book-author {
      font-size: 0.85rem;
      color: var(--muted);
      margin: 0.2rem 0 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ---------- Modal ---------- */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(20, 20, 20, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: var(--bg);
      max-width: 560px;
      width: 100%;
      padding: 2.5rem;
      border-radius: 6px;
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-close {
      position: absolute;
      top: 0.75rem;
      right: 1rem;
      background: none;
      border: none;
      font-size: 1.75rem;
      line-height: 1;
      cursor: pointer;
      color: var(--muted);
      padding: 0.25rem 0.5rem;
    }
    .modal-close:hover { color: var(--text); }
    .modal-cover {
      width: 160px;
      aspect-ratio: 2/3;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 1.5rem;
      background: var(--card);
      display: block;
    }
    .modal h2 {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 400;
      font-size: 1.85rem;
      margin: 0 0 0.25rem;
      line-height: 1.25;
    }
    .modal .modal-author {
      color: var(--muted);
      margin: 0 0 1.25rem;
      font-size: 1.05rem;
    }
    .modal-field {
      margin-top: 1rem;
    }
    .modal-field-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }
    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
.pill {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      background: var(--card);
      border-radius: 999px;
      color: var(--text);
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .pill:hover {
      border-color: var(--text);
    }
    .pill.unclickable {
      cursor: default;
    }
    .pill.unclickable:hover {
      border-color: transparent;
    }
    .modal-field-value {
      font-size: 1rem;
      color: var(--text);
    }
    /* ISBN specifically: mono */
    #modal-isbn {
      font-family: var(--font-mono);
      font-size: 0.95rem;
    }
  </style>
</head>

<header>

      <h1>Matt Yow's bookshelf</h1>
    </button>

<div class="search-wrap">

      spellcheck="false"

    <div id="filters" class="filters"></div>
  </div>
  <main>
    <div id="grid" class="grid"></div>

  <div id="modal-backdrop" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">

      <p id="modal-author" class="modal-author"></p>

        <div class="modal-field-label">Motifs</div>
        <div id="modal-motifs" class="pill-list"></div>
      </div>

      <div id="modal-isbn-wrap" class="modal-field" hidden>
        <div class="modal-field-label">ISBN</div>
        <div id="modal-isbn" class="modal-field-value"></div>
      </div>
    </div>
  </div>

    <button id="to-top" class="to-top" aria-label="Back to top">

    </svg>
  </button>

  // ----------------------------------------------------------------
    // Cover image lookup: Google Books primary, Open Library fallback.
    // Lazy-loaded via IntersectionObserver — covers fetch only when
    // their card scrolls into view. Results cached in memory.
    // ----------------------------------------------------------------
    const coverCache = new Map();        // isbn -> resolved URL (or null)
    const inflightLookups = new Map();   // isbn -> Promise<url|null>

    function openLibraryUrl(isbn) {
      return `https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg`;
    }

    async function googleBooksCover(isbn) {
      try {
        const res = await fetch(
          `https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}&fields=items(volumeInfo/imageLinks)`
        );
        if (!res.ok) return null;
        const data = await res.json();
        const links = data?.items?.[0]?.volumeInfo?.imageLinks;
        if (!links) return null;
        // Prefer largest available
        let url =
          links.extraLarge ||
          links.large ||
          links.medium ||
          links.small ||
          links.thumbnail ||
          links.smallThumbnail;
        if (!url) return null;
        // Google returns http:// — upgrade to https
        url = url.replace(/^http:\/\//, "https://");
        // Strip page-curl edge and request a larger zoom when possible
        url = url.replace(/&edge=curl/, "");
        return url;
      } catch (err) {
        return null;
      }
    }

    function checkImageLoads(url) {
      // Test that an image URL actually resolves to a usable image.
      // Open Library returns a 1x1 placeholder if no cover exists.
      return new Promise((resolve) => {
        const probe = new Image();
        probe.onload = () => {
          // 1x1 image = Open Library's "no cover" placeholder
          if (probe.naturalWidth <= 1 && probe.naturalHeight <= 1) {
            resolve(false);
          } else {
            resolve(true);
          }
        };
        probe.onerror = () => resolve(false);
        probe.src = url;
      });
    }

    async function findCover(isbn) {
      if (!isbn) return null;
      if (coverCache.has(isbn)) return coverCache.get(isbn);
      if (inflightLookups.has(isbn)) return inflightLookups.get(isbn);

      const lookup = (async () => {
        // Try Google Books first
        const gUrl = await googleBooksCover(isbn);
        if (gUrl) {
          coverCache.set(isbn, gUrl);
          return gUrl;
        }
        // Fall back to Open Library
        const oUrl = openLibraryUrl(isbn);
        const valid = await checkImageLoads(oUrl);
        const result = valid ? oUrl : null;
        coverCache.set(isbn, result);
        return result;
      })();

      inflightLookups.set(isbn, lookup);
      const result = await lookup;
      inflightLookups.delete(isbn);
      return result;
    }

    // IntersectionObserver triggers cover lookup when card enters viewport
    const coverObserver = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting) return;
          const wrap = entry.target;
          const isbn = wrap.dataset.isbn;
          coverObserver.unobserve(wrap);

          findCover(isbn).then((url) => {
            if (!url) return;
            const img = document.createElement("img");
            img.src = url;
            img.alt = wrap.dataset.title || "";
            img.loading = "lazy";
            img.decoding = "async";
            img.style.position = "absolute";
            img.style.inset = "0";
            img.onerror = () => { img.remove(); };
            wrap.appendChild(img);
          });
        });
      },
      { rootMargin: "200px" }   // Start fetching 200px before entering view
    );

    function renderCard(book) {
      const card = document.createElement("button");
      card.className = "card";
      card.type = "button";

      const wrap = document.createElement("div");
      wrap.className = "cover-wrap";
      wrap.dataset.isbn = book.isbn || "";
      wrap.dataset.title = book.title;

      const placeholder = document.createElement("div");
      placeholder.className = "placeholder";
      placeholder.innerHTML = `
        <span class="ph-title">${book.title}</span>
        <span class="ph-author">${book.author}</span>
      `;
      wrap.appendChild(placeholder);

      // Only start observing if there's an ISBN to look up
      if (book.isbn) coverObserver.observe(wrap);

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = `
        <p class="book-title">${book.title}</p>
        <p class="book-author">${book.author}</p>
      `;

      card.appendChild(wrap);
      card.appendChild(meta);
      card.addEventListener("click", () => openModal(book));
      return card;
    }

function renderPills(container, items, type) {
      container.innerHTML = "";
      items.forEach((label) => {
        const pill = document.createElement("button");
        pill.className = "pill";
        pill.type = "button";
        pill.textContent = label;
        pill.title = `Filter by ${label}`;
        pill.addEventListener("click", (e) => {
          e.stopPropagation();
          filterFromModal(type, label);
        });
        container.appendChild(pill);
      });
    }

function filterFromModal(type, value) {
      closeModal();
      searchInput.value = "";
      if (type === "genre") {
        activeGenre = value;
        activeTheme = null;
      } else if (type === "theme") {
        activeGenre = null;
        activeTheme = value;
      }
      renderFilters();
      render("");
      filtersContainer.classList.add("open");
      filtersToggle.setAttribute("aria-expanded", "true");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

async function openModal(book) {
      const url = await findCover(book.isbn);
      if (url) {
        modalCover.src = url;
        modalCover.alt = book.title;
        modalCover.style.display = "";
      } else {
        modalCover.style.display = "none";
      }

      modalTitle.textContent = book.title;
      modalAuthor.textContent = book.author;

      if (book.additionalAuthors) {
        modalAdditionalAuthors.textContent = book.additionalAuthors;
        modalAdditionalAuthorsWrap.hidden = false;
      } else {
        modalAdditionalAuthorsWrap.hidden = true;
      }

      if (book.genres && book.genres.length) {
        renderPills(modalGenres, book.genres, "genre");
        modalGenresWrap.hidden = false;
      } else {
        modalGenresWrap.hidden = true;
      }

      if (book.themes && book.themes.length) {
        renderPills(modalThemes, book.themes, "theme");
        modalThemesWrap.hidden = false;
      } else {
        modalThemesWrap.hidden = true;
      }

      if (book.motifs && book.motifs.length) {
        renderPills(modalMotifs, book.motifs);
        modalMotifsWrap.hidden = false;
      } else {
        modalMotifsWrap.hidden = true;
      }

      if (book.isbn) {
        modalIsbn.textContent = book.isbn;
        modalIsbnWrap.hidden = false;
      } else {
        modalIsbnWrap.hidden = true;
      }

      backdrop.classList.add("open");
      backdrop.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      backdrop.classList.remove("open");
      backdrop.setAttribute("aria-hidden", "true");
    }

    backdrop.addEventListener("click", (e) => {
      if (e.target === backdrop) closeModal();
    });
    document.querySelector(".modal-close").addEventListener("click", closeModal);
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

// Fisher-Yates shuffle for a fair random order
    const SORTED_BOOKS = (() => {
      const arr = BOOKS.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    })();
    const searchInput = document.getElementById("search");
    const resultsCount = document.getElementById("results-count");
    const filtersContainer = document.getElementById("filters");

    let activeGenre = null;
    let activeTheme = null;

    function normalize(str) {
      return (str || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

function bookMatches(book, query, genre, exactTheme) {
      if (genre && !(book.genres || []).includes(genre)) return false;
      if (exactTheme && !(book.themes || []).includes(exactTheme)) return false;
      if (!query) return true;
      const haystack = normalize(
        [book.title, book.author, book.additionalAuthors].filter(Boolean).join(" ")
      );
      return query.split(/\s+/).every((term) => haystack.includes(term));
    }

    function getGenreCounts() {
      const counts = new Map();
      SORTED_BOOKS.forEach((book) => {
        (book.genres || []).forEach((g) => {
          counts.set(g, (counts.get(g) || 0) + 1);
        });
      });
      return counts;
    }

    function renderFilters() {
      filtersContainer.innerHTML = "";
      const counts = getGenreCounts();
      // Sort genres by frequency (most common first), then alphabetically
      const sortedGenres = Array.from(counts.entries()).sort((a, b) => {
        if (b[1] !== a[1]) return b[1] - a[1];
        return a[0].localeCompare(b[0]);
      });

      // "All" pill first
      const allBtn = document.createElement("button");
      allBtn.className = "filter-pill" + (activeGenre === null ? " active" : "");
      allBtn.textContent = `All (${SORTED_BOOKS.length})`;
      allBtn.addEventListener("click", () => {
        activeGenre = null;
        renderFilters();
        render(searchInput.value);
      });
      filtersContainer.appendChild(allBtn);

      sortedGenres.forEach(([genre, count]) => {
        const btn = document.createElement("button");
        btn.className = "filter-pill" + (activeGenre === genre ? " active" : "");
        btn.textContent = `${genre} (${count})`;
        btn.addEventListener("click", () => {
          activeGenre = activeGenre === genre ? null : genre;
          renderFilters();
          render(searchInput.value);
        });
        filtersContainer.appendChild(btn);
      });
    }

function render(query = "") {
      const normalizedQuery = normalize(query.trim());
      const filtered = SORTED_BOOKS.filter((book) =>
        bookMatches(book, normalizedQuery, activeGenre, activeTheme)
      );

      grid.innerHTML = "";

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No books found.";
        grid.appendChild(empty);
      } else {
        filtered.forEach((book) => grid.appendChild(renderCard(book)));
      }

      const total = SORTED_BOOKS.length;
const parts = [];
      if (activeGenre) parts.push(activeGenre);
      if (activeTheme) parts.push(`theme: ${activeTheme}`);
      if (normalizedQuery) parts.push(`"${query.trim()}"`);
      const filterText = parts.length ? ` matching ${parts.join(" + ")}` : "";
      resultsCount.textContent = (normalizedQuery || activeGenre)
        ? `${filtered.length} of ${total} books${filterText}`
        : `${total} books`;
    }

    searchInput.addEventListener("input", (e) => render(e.target.value));

    function resetHome() {
      activeGenre = null;
      activeTheme = null;
      searchInput.value = "";
      renderFilters();
      render("");
      // Collapse the filter panel
      filtersContainer.classList.remove("open");
      filtersToggle.setAttribute("aria-expanded", "false");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.getElementById("reset-home").addEventListener("click", resetHome);
    document.getElementById("reset-logo").addEventListener("click", resetHome);

const filtersToggle = document.getElementById("filters-toggle");
    const filtersToggleLabel = document.getElementById("filters-toggle-label");

function updateToggleLabel() {
      if (activeGenre) {
        filtersToggleLabel.textContent = `Filter: ${activeGenre}`;
      } else if (activeTheme) {
        filtersToggleLabel.textContent = `Theme: ${activeTheme}`;
      } else {
        filtersToggleLabel.textContent = "Filter by genre";
      }
    }

    filtersToggle.addEventListener("click", () => {
      const isOpen = filtersContainer.classList.toggle("open");
      filtersToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    });

    // Wrap render() so we also update the toggle label whenever filtering changes
    const originalRender = render;
    render = function (query = "") {
      updateToggleLabel();
      return originalRender(query);
    };

    renderFilters();
    render();
    const toTopBtn = document.getElementById("to-top");

    window.addEventListener("scroll", () => {
      if (window.scrollY > 600) {
        toTopBtn.classList.add("visible");
      } else {
        toTopBtn.classList.remove("visible");
      }
    });

    toTopBtn.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>
</body>
</html>
